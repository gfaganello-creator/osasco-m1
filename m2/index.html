<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>M2 — Ficha do Atleta — Osasco Sporting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0A0F14;--ink1:#1C2733;--ink2:#3B4D5E;--ink3:#7A8FA4;--ink4:#B0BFCC;
  --surface:#F9FAFB;--s1:#FFFFFF;--s2:#F2F5F8;--s3:#E8EDF3;--s4:#DDE4EC;
  --accent:#2563EB;--acc2:rgba(37,99,235,.10);--acc3:rgba(37,99,235,.05);
  --gold:#B8922A;--gold2:rgba(184,146,42,.10);
  --ok:#15803D;--ok2:rgba(21,128,61,.09);--ok3:rgba(21,128,61,.04);
  --warn:#B45309;--warn2:rgba(180,83,9,.09);--warn3:rgba(180,83,9,.04);
  --risk:#B91C1C;--risk2:rgba(185,28,28,.09);--risk3:rgba(185,28,28,.04);
  --f-display:'Syne',sans-serif;--f-body:'Inter',sans-serif;--f-mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.16,1,.3,1);--r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f-body);background:var(--surface);color:var(--ink);min-height:100vh;}

/* TOPBAR */
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.brand img{width:28px;height:28px;object-fit:contain;border-radius:4px;}
/* LAYOUT */
.page{max-width:1360px;margin:0 auto;padding:28px 28px 80px;}

/* SELECTOR */
.selector-bar{display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:12px 16px;margin-bottom:24px;}
.selector-bar label{font-size:12px;color:var(--ink3);font-weight:500;white-space:nowrap;}
select#athlete-select{flex:1;font-family:var(--f-body);font-size:13px;font-weight:500;border:1px solid var(--s4);border-radius:6px;padding:7px 10px;background:var(--s2);color:var(--ink);cursor:pointer;max-width:360px;}
select#athlete-select:focus{outline:none;border-color:var(--accent);}

/* PROFILE HEADER */
.profile-header{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.avatar{width:60px;height:60px;border-radius:50%;background:var(--acc2);border:2px solid var(--s3);display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:20px;font-weight:700;color:var(--accent);flex-shrink:0;}
.profile-info{flex:1;min-width:0;}
.profile-name{font-family:var(--f-display);font-size:22px;font-weight:700;margin-bottom:6px;}
.profile-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.p-tag{font-size:11px;color:var(--ink3);background:var(--s2);border:1px solid var(--s4);padding:2px 8px;border-radius:4px;}
.score-box{display:flex;flex-direction:column;align-items:center;background:var(--s2);border:1px solid var(--s4);border-radius:8px;padding:14px 20px;min-width:88px;flex-shrink:0;}
.score-num{font-family:var(--f-display);font-size:36px;font-weight:800;line-height:1;}
.score-lbl{font-family:var(--f-mono);font-size:9px;color:var(--ink3);letter-spacing:1px;margin-top:4px;text-transform:uppercase;}
.score-cls{font-size:11px;font-weight:600;margin-top:3px;}
.score-cls.ok{color:var(--ok);}
.score-cls.warn{color:var(--warn);}
.score-cls.risk{color:var(--risk);}

/* DECISION SECTION */
.decision-section{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:20px 24px;margin-bottom:20px;}
.decision-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.section-title{font-family:var(--f-display);font-size:14px;font-weight:700;color:var(--ink);}
.jogo-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2);background:var(--s2);border:1px solid var(--s4);padding:5px 12px;border-radius:6px;}
.jogo-pill .d-badge{font-family:var(--f-mono);font-size:11px;font-weight:700;color:var(--accent);}
.decision-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:600px){.decision-cards{grid-template-columns:1fr;}}
.dec-card{border-radius:8px;padding:16px;border:2px solid transparent;cursor:default;transition:all .2s;}
.dec-card.active-dec{border-color:currentColor;}
.dec-ok   {background:var(--ok3);color:var(--ok);}
.dec-warn {background:var(--warn3);color:var(--warn);}
.dec-risk {background:var(--risk3);color:var(--risk);}
.dec-inactive{background:var(--s2);color:var(--ink4);border-color:var(--s4)!important;}
.dec-icon{width:28px;height:28px;margin-bottom:8px;}
.dec-icon svg{width:28px;height:28px;}
.dec-label{font-family:var(--f-display);font-size:14px;font-weight:700;margin-bottom:4px;}
.dec-sub{font-size:11px;opacity:.8;line-height:1.4;}
.dec-card.active-dec .dec-label::after{content:' ✓';font-size:12px;}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:14px 16px;}
.kpi-label{font-family:var(--f-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.kpi-val{font-family:var(--f-display);font-size:20px;font-weight:700;color:var(--ink);}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:3px;}
.trend-up{color:var(--risk);}
.trend-down{color:var(--ok);}
.trend-flat{color:var(--ink3);}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:720px){.charts-row{grid-template-columns:1fr;}}
.chart-card{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:20px;}
.chart-title{font-family:var(--f-display);font-size:13px;font-weight:600;margin-bottom:4px;}
.chart-sub{font-size:11px;color:var(--ink3);margin-bottom:14px;}
canvas{display:block;width:100%!important;}

/* TREND INDICATOR */
.trend-bar{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--ink3);}
.trend-indicator{display:inline-flex;align-items:center;gap:4px;font-weight:600;font-size:12px;}

/* HISTORY TABLE */
.hist-card{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:20px;margin-bottom:20px;overflow-x:auto;}
.hist-title{font-family:var(--f-display);font-size:13px;font-weight:600;margin-bottom:14px;}
table.hist{width:100%;border-collapse:collapse;font-size:12px;}
table.hist th{font-family:var(--f-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);padding:6px 10px;border-bottom:1px solid var(--s3);text-align:left;white-space:nowrap;}
table.hist td{padding:8px 10px;border-bottom:1px solid var(--s3);color:var(--ink2);}
table.hist tr:last-child td{border-bottom:none;}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;}
.pill.apronto{background:var(--ok2);color:var(--ok);}
.pill.alerta{background:var(--warn2);color:var(--warn);}
.pill.reab{background:var(--risk2);color:var(--risk);}

/* STATE */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--ink3);}
.state-screen svg{width:32px;height:32px;opacity:.4;}
.state-title{font-family:var(--f-display);font-size:16px;font-weight:600;color:var(--ink2);}
.state-sub{font-size:12px;text-align:center;max-width:280px;}


/* ─── PREMIUM UNIFIED NAV ───────────────────────────────────────── */
:root{
  --pnav-bg:#07090C;
  --pnav-border:rgba(255,255,255,.06);
  --pnav-text:rgba(255,255,255,.42);
  --pnav-hover:rgba(255,255,255,.75);
  --pnav-active:#F0F4FF;
  --pnav-accent:#2563EB;
  --pnav-accent-line:#3B82F6;
  --pnav-h:58px;
  --pnav-live:#16A34A;
  --pnav-live-bg:rgba(22,163,74,.12);
  --pnav-soon:rgba(255,255,255,.18);
  --pnav-soon-bg:rgba(255,255,255,.05);
}
.pnav{
  position:sticky;top:0;z-index:200;
  background:var(--pnav-bg);
  border-bottom:1px solid var(--pnav-border);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
}
.pnav-inner{
  max-width:1360px;margin:0 auto;padding:0 28px;
  height:var(--pnav-h);
  display:flex;align-items:center;gap:0;
}
/* ── Brand ── */
.pnav-brand{
  display:flex;align-items:center;gap:11px;
  text-decoration:none;flex-shrink:0;
  margin-right:32px;
  padding-right:32px;
  border-right:1px solid rgba(255,255,255,.07);
}
.pnav-logo{
  width:32px;height:32px;border-radius:6px;
  object-fit:contain;flex-shrink:0;
}
.pnav-brand-copy{}
.pnav-brand-name{
  font-family:var(--f-display,'Syne',sans-serif);
  font-size:14px;font-weight:700;
  color:#fff;letter-spacing:-.2px;
  line-height:1;
  display:block;
}
.pnav-brand-sub{
  font-size:9px;
  color:rgba(255,255,255,.28);
  letter-spacing:.8px;
  text-transform:uppercase;
  display:block;
  margin-top:3px;
}
/* ── Links ── */
.pnav-links{
  display:flex;align-items:stretch;gap:0;
  flex:1;min-width:0;height:var(--pnav-h);
}
.pnav-link{
  display:inline-flex;align-items:center;gap:7px;
  font-family:var(--f-body,'Inter',sans-serif);
  font-size:12.5px;font-weight:500;
  color:var(--pnav-text);
  text-decoration:none;
  padding:0 14px;
  height:100%;
  border-bottom:2px solid transparent;
  position:relative;
  white-space:nowrap;
  transition:color .18s;
  letter-spacing:.1px;
}
.pnav-link:hover:not(.pnav-inactive){color:var(--pnav-hover);}
.pnav-link.pnav-active{
  color:var(--pnav-active);
  border-bottom-color:var(--pnav-accent-line);
}
.pnav-link.pnav-inactive{
  color:rgba(255,255,255,.22);
  cursor:default;
  pointer-events:none;
}
/* ── Icons ── */
.pnav-icon{
  width:14px;height:14px;flex-shrink:0;
  opacity:.55;
}
.pnav-link.pnav-active .pnav-icon,
.pnav-link:hover:not(.pnav-inactive) .pnav-icon{opacity:.9;}
.pnav-link.pnav-inactive .pnav-icon{opacity:.25;}
/* ── Status chips ── */
.pnav-chip{
  font-family:var(--f-mono,'JetBrains Mono',monospace);
  font-size:8.5px;font-weight:500;
  letter-spacing:.6px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;
  margin-left:2px;
}
.pnav-chip-live{
  background:var(--pnav-live-bg);
  color:var(--pnav-live);
}
.pnav-chip-soon{
  background:var(--pnav-soon-bg);
  color:var(--pnav-soon);
}
/* ── Right slot ── */
.pnav-right{
  margin-left:auto;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
/* ── Responsive ── */
@media(max-width:640px){
  .pnav-brand-sub{display:none;}
  .pnav-brand{margin-right:16px;padding-right:16px;}
  .pnav-link{padding:0 9px;font-size:11.5px;}
  .pnav-link span.pnav-label{display:none;}
}


/* Clinical + Disciplina panel */
.clin-wrap{margin-top:20px;background:var(--s2);border:1px solid var(--s4);border-radius:10px;padding:16px 18px;}
.clin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.clin-title{font-family:var(--f-display);font-size:13px;font-weight:700;color:var(--ink);}
.clin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.clin-section{}.clin-section-title{font-family:var(--f-mono);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--s3);}
.clin-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--s3);}
.clin-row:last-child{border-bottom:none;}.clin-key{color:var(--ink3);}.clin-val{color:var(--ink2);font-weight:500;}
.clin-alertas{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.alerta-tag{font-family:var(--f-mono);font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.3px;}
.alerta-tag.t-danger{background:rgba(185,28,28,.09);color:#B91C1C;}
.alerta-tag.t-warn{background:rgba(180,83,9,.09);color:#B45309;}
.alerta-tag.t-info{background:rgba(37,99,235,.10);color:#2563EB;}
.disp-badge{display:inline-flex;align-items:center;font-family:var(--f-mono);font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:3px 7px;border-radius:4px;white-space:nowrap;}
.disp-ok{background:rgba(21,128,61,.09);color:#15803D;}.disp-limitado{background:rgba(180,83,9,.09);color:#B45309;}
.disp-reab{background:rgba(185,28,28,.09);color:#B91C1C;}.disp-suspenso{background:rgba(185,28,28,.09);color:#B91C1C;}
.disp-pendurado{background:rgba(184,146,42,.12);color:#B8922A;}
@media(max-width:600px){.clin-grid{grid-template-columns:1fr;}}

/* ── page header M2 ── */
.page-hdr{padding:24px 28px 8px;}
.page-eyebrow{font-family:var(--f-mono);font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.page-title{font-family:var(--f-display);font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.5px;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--ink3);margin-bottom:0;}

/* ═══ M2 DECISION PANEL ═══ */
.decisao-principal{border-radius:var(--r);padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.decisao-principal.dp-ok{background:var(--ok2);border:1.5px solid rgba(21,128,61,.22);}
.decisao-principal.dp-warn{background:var(--warn2);border:1.5px solid rgba(180,83,9,.22);}
.decisao-principal.dp-risk{background:var(--risk2);border:1.5px solid rgba(185,28,28,.22);}
.dp-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dp-ok .dp-icon{background:rgba(21,128,61,.14);}.dp-warn .dp-icon{background:rgba(180,83,9,.14);}.dp-risk .dp-icon{background:rgba(185,28,28,.14);}
.dp-icon svg{width:24px;height:24px;}.dp-ok .dp-icon svg{color:var(--ok);}.dp-warn .dp-icon svg{color:var(--warn);}.dp-risk .dp-icon svg{color:var(--risk);}
.dp-body{flex:1;min-width:0;}
.dp-label{font-family:var(--f-display);font-size:20px;font-weight:800;line-height:1;margin-bottom:4px;letter-spacing:-.3px;}
.dp-ok .dp-label{color:var(--ok);}.dp-warn .dp-label{color:var(--warn);}.dp-risk .dp-label{color:var(--risk);}
.dp-sub{font-size:12px;color:var(--ink2);line-height:1.5;}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.dp-tag{font-family:var(--f-mono);font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:4px;}
.dp-tag-ok{background:rgba(21,128,61,.12);color:var(--ok);}.dp-tag-warn{background:rgba(180,83,9,.12);color:var(--warn);}
.dp-tag-risk{background:rgba(185,28,28,.12);color:var(--risk);}.dp-tag-info{background:var(--acc2);color:var(--accent);}
.exec-resumo{background:var(--ink);color:#fff;border-radius:var(--r);padding:16px 20px;margin-bottom:16px;display:flex;gap:14px;align-items:flex-start;}
.exec-resumo-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.exec-resumo-icon svg{width:15px;height:15px;color:rgba(255,255,255,.6);}
.exec-resumo-title{font-family:var(--f-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:4px;}
.exec-resumo-text{font-size:13px;color:rgba(255,255,255,.88);line-height:1.6;}
.risk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:600px){.risk-grid{grid-template-columns:1fr;}}
.risk-eixo{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:16px;}
.risk-eixo-label{font-family:var(--f-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.risk-level{display:flex;align-items:center;gap:8px;}
.risk-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.risk-dot-low{background:var(--ok);}.risk-dot-med{background:var(--warn);}.risk-dot-high{background:var(--risk);}
.risk-level-label{font-family:var(--f-display);font-size:15px;font-weight:700;}
.risk-low{color:var(--ok);}.risk-med{color:var(--warn);}.risk-high{color:var(--risk);}
.risk-eixo-sub{font-size:11px;color:var(--ink3);margin-top:6px;line-height:1.4;}
.disponib-bar{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.disponib-label{font-family:var(--f-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);white-space:nowrap;}
.disponib-badge-lg{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-display);font-size:14px;font-weight:700;padding:6px 14px;border-radius:6px;}
.db-ok{background:var(--ok2);color:var(--ok);}.db-lim{background:var(--warn2);color:var(--warn);}
.db-reab{background:var(--risk2);color:var(--risk);}.db-susp{background:var(--risk2);color:var(--risk);}.db-pend{background:var(--gold2);color:var(--gold);}
.db-dot{width:8px;height:8px;border-radius:50%;background:currentColor;}
.disponib-detail{font-size:12px;color:var(--ink3);margin-left:auto;}
.contexto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.ctx-card{background:var(--s1);border:1px solid var(--s4);border-radius:8px;padding:12px 14px;}
.ctx-label{font-family:var(--f-mono);font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.ctx-val{font-family:var(--f-display);font-size:16px;font-weight:700;color:var(--ink);line-height:1.2;}
.ctx-sub{font-size:10px;color:var(--ink3);margin-top:3px;}
.tendencia-card{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r);padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.tend-indicator{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px;}
.tend-arrow{font-size:28px;line-height:1;}
.tend-label{font-family:var(--f-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.tend-up-ok{color:var(--ok);}.tend-down-bad{color:var(--risk);}.tend-stable{color:var(--ink3);}
.tend-body{flex:1;}.tend-title{font-family:var(--f-display);font-size:13px;font-weight:700;margin-bottom:4px;}
.tend-desc{font-size:12px;color:var(--ink3);line-height:1.5;}
.tend-scores{display:flex;align-items:center;gap:14px;margin-top:10px;}
.tend-score-item{text-align:center;}
.tend-score-num{font-family:var(--f-display);font-size:18px;font-weight:800;}
.tend-score-lbl{font-family:var(--f-mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);}
.rec-tecnica{background:var(--s2);border:1px solid var(--s4);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.rec-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rec-ok .rec-icon{background:var(--ok2);}.rec-ok .rec-icon svg{color:var(--ok);}
.rec-warn .rec-icon{background:var(--warn2);}.rec-warn .rec-icon svg{color:var(--warn);}
.rec-risk .rec-icon{background:var(--risk2);}.rec-risk .rec-icon svg{color:var(--risk);}
.rec-icon svg{width:18px;height:18px;}
.rec-body{flex:1;}.rec-title{font-family:var(--f-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.rec-text{font-family:var(--f-display);font-size:14px;font-weight:700;color:var(--ink);}
.sec-divider{font-family:var(--f-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);padding:8px 0 6px;border-bottom:1px solid var(--s3);margin-bottom:12px;}
</style>

<script>
function calcRiscoFisico(sc){if(sc.tipoStatus==='reab')return 'alto';if(sc.tipoStatus==='alerta'||sc.pdor>=3)return 'medio';if(sc.score<48||sc.pdor>=1)return 'medio';return 'baixo';}
function calcRiscoClinico(clinical){if(!clinical)return 'baixo';if(clinical.bloqueio)return 'alto';if(clinical.status==='limitado')return 'medio';if(clinical.diasRetReal!==null&&clinical.diasRetReal<=7)return 'medio';if(clinical.diasLesao!==null&&clinical.diasLesao<=30)return 'medio';return 'baixo';}
function calcRiscoCompetitivo(disciplina){if(!disciplina)return 'baixo';if(disciplina.suspenso)return 'alto';if(disciplina.pendurado)return 'medio';return 'baixo';}
function riscoLabel(n){if(n==='alto')return{cls:'risk-high',dot:'risk-dot-high',label:'Alto'};if(n==='medio')return{cls:'risk-med',dot:'risk-dot-med',label:'M\u00e9dio'};return{cls:'risk-low',dot:'risk-dot-low',label:'Baixo'};}
function buildAlertas(sc,clinical,disciplina){var t=[];if(sc.tipoStatus==='reab')t.push({tipo:'risk',m:'NSP: Reabilita\u00e7\u00e3o'});else if(sc.tipoStatus==='alerta')t.push({tipo:'warn',m:'NSP: Alerta'});if(sc.pdor>=3)t.push({tipo:'risk',m:sc.pdor+' pts de dor'});else if(sc.pdor>=1)t.push({tipo:'warn',m:sc.pdor+' pt dor'});if(clinical&&clinical.diasRetReal!==null&&clinical.diasRetReal<=7)t.push({tipo:'warn',m:'Retorno '+clinical.diasRetReal+'d'});else if(clinical&&clinical.diasLesao!==null&&clinical.diasLesao<=30)t.push({tipo:'warn',m:'Les\u00e3o '+clinical.diasLesao+'d'});if(disciplina&&disciplina.suspenso)t.push({tipo:'risk',m:'Suspenso'});else if(disciplina&&disciplina.pendurado)t.push({tipo:'warn',m:'Pendurado'});return t;}
function buildResumoExecutivo(sc,clinical,disciplina,disponibilidade,scoreTrend){var p=[];if(disponibilidade.bloqueio){p.push(disciplina&&disciplina.suspenso?'Suspenso por cart\u00f5es':'Em reabilita\u00e7\u00e3o');}else if(disponibilidade.status==='Limitado'){p.push('Disponibilidade limitada');}else{p.push('Atleta dispon\u00edvel');}p.push(sc.classe==='OK'?'com score de performance elevado':sc.classe==='Aten\u00e7\u00e3o'?'com score em zona de aten\u00e7\u00e3o':'com score baixo');if(scoreTrend==='up')p.push('e tend\u00eancia positiva recente');else if(scoreTrend==='down')p.push('e queda recente de performance');else p.push('sem varia\u00e7\u00e3o relevante');if(clinical&&clinical.diasRetReal!==null&&clinical.diasRetReal<=7)p.push('Retorno recente exige controle de carga');else if(clinical&&clinical.diasLesao!==null&&clinical.diasLesao<=30)p.push('Les\u00e3o recente \u2014 monitorar');if(disciplina&&disciplina.pendurado)p.push('Pendurado no campeonato');return p[0].charAt(0).toUpperCase()+p[0].slice(1)+', '+p.slice(1).join('. ')+'.';}
function buildDecisaoPrincipal(sc,disponibilidade){if(disponibilidade.bloqueio){return{cls:'dp-risk',tipo:'risk',label:disponibilidade.status==='Suspenso'?'Suspenso':'N\u00e3o escalar',sub:disponibilidade.status==='Suspenso'?'Atleta suspenso por cart\u00f5es \u2014 indispon\u00edvel competitivamente':'Atleta em reabilita\u00e7\u00e3o \u2014 n\u00e3o utilizar em jogo'};}if(sc.decType==='ok')return{cls:'dp-ok',tipo:'ok',label:'Pronto 90min',sub:'Atleta em condi\u00e7\u00f5es plenas de jogo'};if(sc.decType==='warn')return{cls:'dp-warn',tipo:'warn',label:'Gerir minutos',sub:'Utilizar com controle de carga \u2014 45 a 70 min'};return{cls:'dp-risk',tipo:'risk',label:'N\u00e3o escalar',sub:'Condi\u00e7\u00f5es f\u00edsicas ou cl\u00ednicas impedem utiliza\u00e7\u00e3o'};}
function renderDecisaoPrincipal(dp,tags){var icons={ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',risk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};var tagsHtml=tags.length?'<div class="dp-tags">'+tags.map(function(t){return'<span class="dp-tag dp-tag-'+t.tipo+'">'+t.m+'</span>';}).join('')+'</div>':'';return'<div class="decisao-principal '+dp.cls+'"><div class="dp-icon">'+icons[dp.tipo]+'</div><div class="dp-body"><div class="dp-label">'+dp.label+'</div><div class="dp-sub">'+dp.sub+'</div>'+tagsHtml+'</div></div>';}
function renderRiscoEixos(rf,rc,rcomp){function eixo(titulo,nivel,subs){var r=riscoLabel(nivel);return'<div class="risk-eixo"><div class="risk-eixo-label">'+titulo+'</div><div class="risk-level"><div class="risk-dot '+r.dot+'"></div><span class="risk-level-label '+r.cls+'">'+r.label+'</span></div><div class="risk-eixo-sub">'+(subs[nivel]||'')+'</div></div>';}return'<div class="risk-grid">'+eixo('Risco F\u00edsico',rf,{alto:'Limita\u00e7\u00e3o f\u00edsica significativa',medio:'Monitorar carga e dor',baixo:'Condi\u00e7\u00f5es f\u00edsicas adequadas'})+eixo('Risco Cl\u00ednico',rc,{alto:'Restri\u00e7\u00e3o cl\u00ednica ativa',medio:'Hist\u00f3rico recente de les\u00e3o',baixo:'Sem alertas cl\u00ednicos'})+eixo('Risco Competitivo',rcomp,{alto:'Suspenso por cart\u00f5es',medio:'Pendurado \u2014 risco de suspens\u00e3o',baixo:'Sem restri\u00e7\u00f5es disciplinares'})+'</div>';}
function renderTendencia(scoreTrend,scoreHist,sc){var avg=scoreHist.length?Math.round(scoreHist.slice(-3).reduce(function(a,b){return a+b;},0)/Math.min(3,scoreHist.length)):sc.score;var arrow,tcls,tlbl,desc;if(scoreTrend==='up'){arrow='\u2197';tcls='tend-up-ok';tlbl='Melhorando';desc='Evolu\u00e7\u00e3o positiva nos \u00faltimos registros';}else if(scoreTrend==='down'){arrow='\u2198';tcls='tend-down-bad';tlbl='Piorando';desc='Queda recente exige aten\u00e7\u00e3o';}else{arrow='\u2192';tcls='tend-stable';tlbl='Est\u00e1vel';desc='Sem varia\u00e7\u00e3o relevante';}var sc2=function(v){return v>=72?'var(--ok)':v>=48?'var(--warn)':'var(--risk)';};return'<div class="tendencia-card"><div class="tend-indicator"><div class="tend-arrow '+tcls+'">'+arrow+'</div><div class="tend-label '+tcls+'">'+tlbl+'</div></div><div class="tend-body"><div class="tend-title">Tend\u00eancia de Performance</div><div class="tend-desc">'+desc+'</div><div class="tend-scores"><div class="tend-score-item"><div class="tend-score-num" style="color:'+sc2(sc.score)+'">'+sc.score+'</div><div class="tend-score-lbl">Score atual</div></div><div style="color:var(--ink3);font-size:16px">\u2192</div><div class="tend-score-item"><div class="tend-score-num" style="color:'+sc2(avg)+'">'+avg+'</div><div class="tend-score-lbl">M\u00e9dia recente</div></div></div></div></div>';}
function renderRecTecnica(sc,disponibilidade){var tipo,texto;if(disponibilidade.bloqueio){tipo='risk';texto=disponibilidade.status==='Suspenso'?'N\u00e3o utilizar \u2014 suspenso':'N\u00e3o utilizar \u2014 reabilitar';}else if(sc.decType==='ok'){tipo='ok';texto='Escalar normalmente';}else if(sc.decType==='warn'){tipo='warn';texto='Escalar com controle de minutos';}else{tipo='risk';texto='N\u00e3o utilizar';}var icons={ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',risk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};return'<div class="rec-tecnica rec-'+tipo+'"><div class="rec-icon">'+icons[tipo]+'</div><div class="rec-body"><div class="rec-title">Recomenda\u00e7\u00e3o T\u00e9cnica</div><div class="rec-text">'+texto+'</div></div></div>';}

function urlSheet(sid, aba) {
  return 'https://docs.google.com/spreadsheets/d/' + sid + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(aba);
}
async function fetchCSV(url) {
  var r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.text();
}
function parseCSV(txt) {
  if (!txt || typeof txt !== 'string') return [];
  var rows=[], row=[], cell='', inQ=false;
  for (var i=0; i<txt.length; i++) {
    var c = txt[i];
    if (c==='"') { inQ=!inQ; continue; }
    if (!inQ && c===',') { row.push(cell.trim()); cell=''; continue; }
    if (!inQ && (c==='\n'||c==='\r')) {
      if (c==='\r'&&txt[i+1]==='\n') i++;
      row.push(cell.trim()); cell='';
      if (row.some(function(x){return x;})) rows.push(row);
      row=[]; continue;
    }
    cell+=c;
  }
  if (cell||row.length) { row.push(cell.trim()); if (row.some(function(x){return x;})) rows.push(row); }
  if (!rows.length) return [];
  var headers = rows[0];
  return rows.slice(1).map(function(r2) {
    var o={};
    headers.forEach(function(h,i){o[h]=r2[i]||'';});
    return o;
  });
}

function normNome(s){
  if(!s) return '';
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/\s+/g,' ');
}

function parseDataFlex(s){
  if(!s) return null;
  s=String(s).trim();
  var m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);
  if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  var d=new Date(s); return isNaN(d)?null:d;
}

function diasDesdeData(d){
  if(!d) return null;
  var t=d instanceof Date?d.getTime():(parseDataFlex(d)||{getTime:function(){return Date.now();}}).getTime();
  return Math.floor((Date.now()-t)/86400000);
}

var EPI_COL_ALIASES={
  nome:                  ['nome','atleta','jogador','player'],
  status:                ['status','situacao','situa\u00e7\u00e3o','condi\u00e7\u00e3o','disponibilidade'],
  tipo_lesao:            ['tipo_lesao','tipo de les\u00e3o','lesao','les\u00e3o','diagnostico','diagn\u00f3stico'],
  data_lesao:            ['data_lesao','data les\u00e3o','data da les\u00e3o','inicio','in\u00edcio'],
  data_retorno_prevista: ['data_retorno_prevista','retorno previsto','prev retorno','data prev'],
  data_retorno_real:     ['data_retorno_real','retorno real','data retorno','retornou em'],
};

function mapEpiRow(row){
  var r={}, keys=Object.keys(row).map(function(k){return{orig:k,norm:normNome(k)};});
  Object.keys(EPI_COL_ALIASES).forEach(function(field){
    var aliases=EPI_COL_ALIASES[field].map(normNome);
    var match=keys.find(function(k){return aliases.some(function(a){return k.norm.includes(a)||a.includes(k.norm);});});
    r[field]=match?(row[match.orig]||'').trim():'';
  });
  return r;
}

function classifyEpi(raw){
  var s=normNome(raw);
  if(!s) return 'disponivel';
  if(s.includes('reab')||s.includes('les')||s.includes('indisponivel')||s.includes('afastado')) return 'reabilitacao';
  if(s.includes('limit')||s.includes('restrit')||s.includes('parcial')||s.includes('transi')) return 'limitado';
  return 'disponivel';
}

function isMuscular(tipoLesao){
  var s=normNome(tipoLesao);
  return s.includes('muscul')||s.includes('coxa')||s.includes('posteriores')||
         s.includes('biceps')||s.includes('adutor')||s.includes('panturr')||
         s.includes('isquio')||s.includes('sural');
}

function buildClinical(nomeAtleta, epiRows){
  var nNome=normNome(nomeAtleta);
  var row=(epiRows||[])
    .map(mapEpiRow)
    .filter(function(r){return normNome(r.nome)===nNome;})
    .sort(function(a,b){
      var da=parseDataFlex(a.data_lesao),db=parseDataFlex(b.data_lesao);
      return(db?db.getTime():0)-(da?da.getTime():0);
    })[0]||null;

  if(!row) return{status:'disponivel',statusLabel:'Dispon\u00edvel',alertas:[],scoreReduction:0,bloqueio:false,tipoLesao:'',dataLesao:null,retornoPrevisto:null,retornoReal:null,diasLesao:null,diasRetReal:null};

  var status=classifyEpi(row.status);
  var dLesao=parseDataFlex(row.data_lesao);
  var dRetPrev=parseDataFlex(row.data_retorno_prevista);
  var dRetReal=parseDataFlex(row.data_retorno_real);
  var diasLesao=diasDesdeData(dLesao);
  var diasRetReal=diasDesdeData(dRetReal);
  var muscular=isMuscular(row.tipo_lesao);
  var alertas=[],reduction=0,bloqueio=false,statusLabel;

  if(status==='reabilitacao'){
    bloqueio=true; reduction=100; statusLabel='Reabilita\u00e7\u00e3o';
    alertas.push({t:'danger',m:'Em reabilita\u00e7\u00e3o'});
  } else if(status==='limitado'){
    reduction=20; statusLabel='Limitado';
    alertas.push({t:'warn',m:'Uso limitado'});
  } else { statusLabel='Dispon\u00edvel'; }

  if(status!=='reabilitacao'){
    if(dRetReal&&diasRetReal!==null&&diasRetReal<=7){ reduction+=15; alertas.push({t:'warn',m:'Retorno recente ('+diasRetReal+'d)'}); }
    if(dLesao&&diasLesao!==null&&diasLesao<=30)    { reduction+=10; alertas.push({t:'warn',m:'Les\u00e3o recente ('+diasLesao+'d)'}); }
    if(muscular)                                   { reduction+=10; alertas.push({t:'warn',m:'Risco muscular'}); }
  }
  return{status,statusLabel,alertas,scoreReduction:Math.min(100,reduction),bloqueio,tipoLesao:row.tipo_lesao,dataLesao:dLesao,retornoPrevisto:dRetPrev,retornoReal:dRetReal,diasLesao,diasRetReal};
}

function buildDisciplina(nomeAtleta, cartoes){
  var nNome=normNome(nomeAtleta);
  var row=(cartoes||[]).find(function(c){return normNome(c.nome)===nNome;})||null;
  if(!row) return{disponivel:true,suspenso:false,pendurado:false,amarelos:0,vermelhos:0,alertas:[],bloqueio:false};
  var suspenso=row.suspenso===true||String(row.suspenso||'').toLowerCase()==='sim';
  var pendurado=row.pendurado===true||String(row.pendurado||'').toLowerCase()==='sim';
  var amarelos=parseInt(row.amarelos||0)||0, vermelhos=parseInt(row.vermelhos||0)||0;
  var alertas=[];
  if(suspenso)  alertas.push({t:'danger',m:'Suspenso por cart\u00f5es'});
  if(pendurado) alertas.push({t:'warn',  m:'Pendurado ('+amarelos+' amarelos)'});
  if(vermelhos>0&&!suspenso) alertas.push({t:'info',m:'Cart\u00e3o vermelho recente'});
  return{disponivel:!suspenso,suspenso,pendurado,amarelos,vermelhos,alertas,bloqueio:suspenso};
}

function calcDisponibilidade(clinical, disciplina){
  if(disciplina.suspenso)              return{status:'Suspenso',           cls:'disp-suspenso',bloqueio:true };
  if(clinical.status==='reabilitacao') return{status:'Reabilita\u00e7\u00e3o',cls:'disp-reab',bloqueio:true };
  if(clinical.status==='limitado')     return{status:'Limitado',           cls:'disp-limitado',bloqueio:false};
  if(disciplina.pendurado)             return{status:'Pendurado',          cls:'disp-pendurado',bloqueio:false};
  return                                      {status:'Dispon\u00edvel',  cls:'disp-ok',       bloqueio:false};
}

function applyOverrides(score, clinical, disciplina){
  if(disciplina.bloqueio) return 0;
  if(clinical.bloqueio)   return Math.min(score,25);
  return Math.min(100,Math.max(0,score-clinical.scoreReduction));
}

function buildResumoColetivo(atletas){
  var counts={disponiveis:0,limitados:0,reabilitacao:0,suspensos:0,pendurados:0,retornos:0};
  var problemas={};
  (atletas||[]).forEach(function(a){
    var d=a._disponibilidade;
    if(!d) return;
    if(d.status==='Dispon\u00edvel')       counts.disponiveis++;
    if(d.status==='Limitado')               counts.limitados++;
    if(d.status==='Reabilita\u00e7\u00e3o') counts.reabilitacao++;
    if(d.status==='Suspenso')               counts.suspensos++;
    if(a._disciplina&&a._disciplina.pendurado) counts.pendurados++;
    if(a._clinical&&a._clinical.diasRetReal!==null&&a._clinical.diasRetReal<=7) counts.retornos++;
    var pos=(a.posicao||'').toUpperCase();
    var setor=pos.includes('GK')||pos.includes('GOL')?'Goleiro':pos.includes('ZAG')?'Zaga':pos.includes('LAT')?'Lateral':pos.includes('VOL')?'Volante':pos.includes('MEI')?'Meia':pos.includes('EXT')?'Extremo':pos.includes('ATA')?'Ataque':'Outros';
    if(d.bloqueio||(a._disciplina&&a._disciplina.pendurado)) problemas[setor]=(problemas[setor]||0)+1;
  });
  var setores=Object.entries(problemas).sort(function(a,b){return b[1]-a[1];}).slice(0,2).map(function(e){return e[0].toLowerCase();});
  var parts=[];
  if(counts.reabilitacao>0) parts.push(counts.reabilitacao+' em reabilita\u00e7\u00e3o');
  if(counts.suspensos>0)    parts.push(counts.suspensos+' suspenso'+(counts.suspensos>1?'s':''));
  if(counts.pendurados>0)   parts.push(counts.pendurados+' pendurado'+(counts.pendurados>1?'s':''));
  if(counts.limitados>0)    parts.push(counts.limitados+' limitado'+(counts.limitados>1?'s':''));
  if(counts.retornos>0)     parts.push(counts.retornos+' retorno recente');
  var resumo=parts.length?parts.join(', ')+'.':'Elenco sem restri\u00e7\u00f5es cl\u00ednicas ou disciplinares.';
  if(setores.length) resumo+=' Setores mais sens\u00edveis: '+setores.join(' e ')+'.';
  return{counts,resumo};
}

function calcularIdade(dataNasc) {
  if (!dataNasc) return null;
  var p = dataNasc.split('/');
  if (p.length!==3) return null;
  var dob = new Date(+p[2],+p[1]-1,+p[0]);
  var hoje = new Date();
  var age = hoje.getFullYear()-dob.getFullYear();
  if (hoje < new Date(hoje.getFullYear(),dob.getMonth(),dob.getDate())) age--;
  return age;
}

function calcScore(nome, recuperacao, preTreino, cargaRows) {
  var rec = recuperacao.find(function(r){return r['Nome']===nome;});
  var status = rec ? (rec['\u00daltimo Status']||rec['Caracter\u00edstica']||rec['Status']||'').trim() : '';
  var tipoStatus = 'sem_reg';
  if (/reab/i.test(status)) tipoStatus='reab';
  else if (/alerta/i.test(status)) tipoStatus='alerta';
  else if (/apronto/i.test(status)) tipoStatus='apronto';
  var A = tipoStatus==='apronto'?35:tipoStatus==='alerta'?18:tipoStatus==='reab'?0:12;

  var wtRows = preTreino.filter(function(r){return (r['Nome:']||r['Nome']||'').trim()===nome;});
  var B=10, pdor=0, wellnessQt=null;
  if (wtRows.length) {
    var ul = wtRows[wtRows.length-1];
    var fad=parseFloat(ul['Fadiga']||'0')||0;
    pdor=parseFloat(ul['Dor']||'0')||0;
    var hum=parseFloat(ul['Humor']||'0')||0;
    var qt=parseFloat(ul['Qualidade do Sono']||ul['QT']||'0')||0;
    wellnessQt = Math.round((fad*0.28+pdor*0.27+hum*0.20+qt*0.25)*10)/10;
    if (fad||pdor||hum||qt) B=Math.round(Math.min(30,Math.max(0,wellnessQt*6)));
  }

  var C=10;
  var cRow = cargaRows.find(function(r){return r['Nome']===nome;});
  if (cRow) {
    var c7=parseFloat(cRow['Carga 7 dias']||cRow['Carga7']||'0')||0;
    var cRef=parseFloat(cRow['Carga Ref']||cRow['CargaRef']||'100')||100;
    if (c7&&cRef){var ratio=c7/cRef;C=ratio<=0.65?14:ratio<=1.10?20:ratio<=1.25?13:ratio<=1.45?7:0;}
  }
  var D=8;
  var score = Math.min(100, A+B+C+D);
  if (tipoStatus==='reab') score=Math.min(score,25);
  else if (tipoStatus==='alerta') score=Math.min(score,55);
  if (pdor>=3) score=Math.min(score,50);
  else if (pdor>=1) score=Math.min(score,62);
  var classe = score>=72?'OK':score>=48?'Aten\u00e7\u00e3o':'Risco';
  // Decision
  var decisao, decType;
  if (tipoStatus==='reab'){decisao='N\u00e3o escalar';decType='risk';}
  else if (score>=72&&pdor===0){decisao='Pronto 90min';decType='ok';}
  else if (score>=72){decisao='Pronto \u2014 monitorar dor';decType='ok';}
  else if (score>=48){decisao='Gerir minutos';decType='warn';}
  else {decisao='N\u00e3o escalar';decType='risk';}
  return {score,classe,A,B,C,D,tipoStatus,status,decisao,decType,pdor,wellnessQt};
}

function parseData(str) {
  if (!str) return null;
  str = String(str).trim();
  var m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    var tp = str.indexOf(' ')>-1?str.split(' ')[1]:'00:00';
    var ps = tp.split(':');
    return new Date(+m[3],+m[2]-1,+m[1],+ps[0]||0,+ps[1]||0);
  }
  var d = new Date(str);
  return isNaN(d.getTime())?null:d;
}
async function fetchProxJogo() {
  try {
    var r = await fetch(PROXY_URL, {redirect:'follow'});
    if (!r.ok) return null;
    var data = await r.json();
    if (data.erro) return null;
    var d = parseData(data.data);
    if (!d) return null;
    var hoje = new Date(); hoje.setHours(0,0,0,0);
    var dj = new Date(d); dj.setHours(0,0,0,0);
    var dias = Math.round((dj-hoje)/86400000);
    PROX_JOGO = {adversario:data.adversario||'?',dias:dias>=0?dias:null,data:data.data,campeonato:data.campeonato||''};
    return PROX_JOGO;
  } catch(e) { return null; }
}

function drawLineChart(canvasId, seriesArr, labels, yMax) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var dpr = window.devicePixelRatio||1;
  var W = canvas.parentElement.offsetWidth||400;
  var H = 150;
  canvas.width  = W*dpr; canvas.height = H*dpr;
  canvas.style.width  = W+'px'; canvas.style.height = H+'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  var pad = {top:14,right:12,bottom:28,left:28};
  var cW = W-pad.left-pad.right;
  var cH = H-pad.top-pad.bottom;
  var n  = labels.length;

  // Grid
  ctx.strokeStyle='#E8EDF3'; ctx.lineWidth=1;
  var gridVals = yMax<=5?[1,2,3,4,5]:yMax<=10?[2,4,6,8,10]:[20,40,60,80,100];
  gridVals.forEach(function(v) {
    var y = pad.top + cH*(1-v/yMax);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cW,y); ctx.stroke();
    ctx.fillStyle='#B0BFCC'; ctx.font='8px JetBrains Mono'; ctx.textAlign='right';
    ctx.fillText(v, pad.left-3, y+3);
  });

  function xp(i){ return pad.left + (n>1?i*cW/(n-1):cW/2); }
  function yp(v){ return pad.top + cH*(1-Math.min(v,yMax)/yMax); }

  seriesArr.forEach(function(s) {
    if (!s.data.length) return;
    // Area fill
    ctx.beginPath();
    s.data.forEach(function(v,i){
      if(i===0) ctx.moveTo(xp(i),yp(v)); else ctx.lineTo(xp(i),yp(v));
    });
    ctx.lineTo(xp(s.data.length-1), pad.top+cH);
    ctx.lineTo(xp(0), pad.top+cH);
    ctx.closePath();
    ctx.fillStyle = s.fill||'rgba(37,99,235,.06)';
    ctx.fill();

    // Line
    ctx.beginPath();
    s.data.forEach(function(v,i){
      if(i===0) ctx.moveTo(xp(i),yp(v)); else ctx.lineTo(xp(i),yp(v));
    });
    ctx.strokeStyle=s.color; ctx.lineWidth=2;
    ctx.lineJoin='round'; ctx.stroke();

    // Dots
    s.data.forEach(function(v,i){
      ctx.beginPath(); ctx.arc(xp(i),yp(v),3,0,Math.PI*2);
      ctx.fillStyle=s.color; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    });
  });

  // X axis labels (first, last, and one in middle)
  ctx.fillStyle='#7A8FA4'; ctx.font='8px JetBrains Mono'; ctx.textAlign='center';
  var toShow = labels.length<=1?[0]:labels.length<=5?labels.map(function(_,i){return i;}):[0,Math.floor((n-1)/2),n-1];
  toShow.forEach(function(i){
    if (labels[i]) ctx.fillText((labels[i]||'').slice(0,5), xp(i), H-8);
  });
}

// ── TREND DETECTION ───────────────────────────────────────────────
function detectTrend(values) {
  if (values.length < 3) return 'flat';
  var recent = values.slice(-3);
  var avg_last = recent.reduce(function(a,b){return a+b;},0)/recent.length;
  var older = values.slice(-6,-3);
  if (!older.length) return 'flat';
  var avg_old = older.reduce(function(a,b){return a+b;},0)/older.length;
  var diff = avg_last - avg_old;
  if (diff > 1.5) return 'up';
  if (diff < -1.5) return 'down';
  return 'flat';
}
function trendHtml(trend, metric) {
  // For wellness (lower = better), for score (higher = better)
  var isScore = metric==='score';
  if (trend==='flat') return '<span class="trend-flat">\u2192 Est\u00e1vel</span>';
  if (isScore) {
    return trend==='up'
      ? '<span class="trend-down">\u2191 Melhorando</span>'
      : '<span class="trend-up">\u2193 Piorando</span>';
  } else {
    // wellness: up = piorando (mais fadiga), down = melhorando
    return trend==='up'
      ? '<span class="trend-up">\u2191 Piorando</span>'
      : '<span class="trend-down">\u2193 Melhorando</span>';
  }
}

    var disciplina    = buildDisciplina(nome, CARTOES_MOCK);

    var recRows = NSP_DATA.recuperacao.filter(function(r){return r['Nome']===nome;});

          '<td style="color:var(--ink3)">'+(r['Observa\u00e7\u00e3o']||r['Obs']||'')+'</td></tr>';
      }).join('')+

  if(!clinical||!disciplina||!disponibilidade)
    return '<div class="clin-wrap"><div style="color:var(--ink3);font-size:12px">Dados cl\u00ednicos n\u00e3o dispon\u00edveis</div></div>';
  var fmtD=function(d){return d?d.toLocaleDateString('pt-BR'):'\u2014';};
  var dc=disponibilidade.cls||'disp-ok';
  var h='<div class="clin-wrap">';
  h+='<div class="clin-header"><span class="clin-title">Disponibilidade</span><span class="disp-badge '+dc+'">'+disponibilidade.status+'</span></div>';
  h+='<div class="clin-grid">';
  // Clinical section
  h+='<div class="clin-section"><div class="clin-section-title">Status Cl\u00ednico</div>';
  h+='<div class="clin-row"><span class="clin-key">Status</span><span class="clin-val">'+clinical.statusLabel+'</span></div>';
  if(clinical.tipoLesao)       h+='<div class="clin-row"><span class="clin-key">Les\u00e3o</span><span class="clin-val">'+clinical.tipoLesao+'</span></div>';
  if(clinical.dataLesao)       h+='<div class="clin-row"><span class="clin-key">Data les\u00e3o</span><span class="clin-val">'+fmtD(clinical.dataLesao)+'</span></div>';
  if(clinical.retornoPrevisto) h+='<div class="clin-row"><span class="clin-key">Retorno previsto</span><span class="clin-val">'+fmtD(clinical.retornoPrevisto)+'</span></div>';
  if(clinical.retornoReal)     h+='<div class="clin-row"><span class="clin-key">Retornou em</span><span class="clin-val">'+fmtD(clinical.retornoReal)+'</span></div>';
  h+='</div>';
  // Disciplina section
  h+='<div class="clin-section"><div class="clin-section-title">Disciplina</div>';
  h+='<div class="clin-row"><span class="clin-key">Amarelos</span><span class="clin-val">'+disciplina.amarelos+'</span></div>';
  h+='<div class="clin-row"><span class="clin-key">Vermelhos</span><span class="clin-val">'+disciplina.vermelhos+'</span></div>';
  var ds=disciplina.suspenso?'<span class="disp-badge disp-suspenso">Suspenso</span>':
         disciplina.pendurado?'<span class="disp-badge disp-pendurado">Pendurado</span>':
         '<span class="disp-badge disp-ok">Dispon\u00edvel</span>';
  h+='<div class="clin-row"><span class="clin-key">Status</span><span class="clin-val">'+ds+'</span></div>';
  h+='</div>';
  h+='</div>';
  // Alerts
  var alls=(clinical.alertas||[]).concat(disciplina.alertas||[]);
  if(alls.length){h+='<div class="clin-alertas">';alls.forEach(function(al){h+='<span class="alerta-tag t-'+al.t+'">'+al.m+'</span>';});h+='</div>';}
  h+='</div>';
  return h;
}
</script>
</body>
</html>
